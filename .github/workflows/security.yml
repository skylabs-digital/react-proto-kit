name: Security
on:
  push:
    branches: [main]
  pull_request:
    paths:
      - '**/package.json'
      - '**/yarn.lock'
      - '**/package-lock.json'
      - '.github/workflows/**'
  schedule:
    - cron: '0 6 * * 1'

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  security:
    uses: skylabs-digital/.github/.github/workflows/security.yml@v1
